<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Mise</title>
  <meta name="theme-color" content="#3E5C6B">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <header id="app-header">
    <h1>Mise</h1>
    <span class="build-stamp">build <span id="build-stamp">\u2014</span></span>
  </header>

  <nav id="tab-bar"></nav>

  <main id="tab-content"></main>

  <div id="toast"></div>

  <script>
    // fetch version.json for the visible build stamp before app.js boots
    fetch('./version.json').then(r => r.json()).then(v => {
      window.MISE_BUILD = `${v.version} (${v.build})`;
    }).catch(() => { window.MISE_BUILD = 'dev'; });
  </script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
